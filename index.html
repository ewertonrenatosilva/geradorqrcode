<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR Code Mobile</title>

<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<style>
body {
  font-family: Arial, sans-serif;
  background: #eaeaea;
  margin: 0;
  display: flex;
  justify-content: center;
}

.container {
  width: 100%;
  max-width: 420px;
  background: #f9f9f9;
  min-height: 100vh;
  padding: 15px;
  box-sizing: border-box;
}

h1 {
  text-align: center;
  font-size: 22px;
  color: #0a7a3d;
}

.box {
  background: white;
  padding: 15px;
  margin-top: 15px;
  border-radius: 12px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.08);
}

input, textarea {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 8px;
  border: 1px solid #ccc;
  font-size: 14px;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  background: #0a7a3d;
  color: white;
  border: none;
  border-radius: 8px;
  font-size: 15px;
  cursor: pointer;
}

button:active {
  transform: scale(0.98);
}

canvas {
  display: block;
  margin: 15px auto;
}

.pix {
  font-size: 11px;
  background: #eee;
  padding: 10px;
  border-radius: 8px;
  word-break: break-all;
}

.upload-btn {
  display: block;
  background: #ddd;
  padding: 12px;
  border-radius: 8px;
  margin-top: 10px;
  cursor: pointer;
  text-align: center;
}
</style>
</head>

<body>

<div class="container">

<h1>📱 QR Code</h1>

<div class="box">
  <input type="text" id="link" placeholder="Link, CPF, @instagram ou WhatsApp">

  <label class="upload-btn">
    Escolha sua LOGO
    <input type="file" id="logoInput" accept="image/*" hidden onchange="mostrarNomeArquivo(this)">
  </label>

  <p id="nomeArquivo" style="font-size:12px;"></p>

  <button onclick="gerarQR()">Gerar QR Code</button>
  <button onclick="baixarQR()">Baixar</button>

  <canvas id="qrcode"></canvas>

  <button id="copiarBtn" style="display:none;" onclick="copiarLink()">
    Copiar link
  </button>
</div>

<div class="box">
  <canvas id="pixQR"></canvas>

  <p><strong>PIX:</strong></p>
  <div class="pix" id="pixCode"></div>

  <button onclick="copiarPix()">Copiar código PIX</button>

  <p style="margin-top:10px; font-size:13px;">
    Peço apenas uma contribuição de R$ 5,00, para eu criar mais sistemas como esse.
  </p>
</div>

<div class="box">
  <textarea id="mensagem">Muito obrigado</textarea>
  <button onclick="enviarWhats()">Enviar WhatsApp</button>
</div>

</div>

<script>
const pix = "08471378485";

let linkGerado = "";

// MOSTRAR NOME DO ARQUIVO
function mostrarNomeArquivo(input) {
  const nome = input.files[0]?.name || "";
  document.getElementById("nomeArquivo").innerText = nome;
}

// GERAR QR
function gerarQR() {
  let input = document.getElementById("link").value.trim();
  const canvas = document.getElementById("qrcode");

  if (!input) {
    alert("Digite algo válido!");
    return;
  }

  let finalLink = "";

  // 🔥 CPF como PIX
  let numeros = input.replace(/\D/g, "");
  if (numeros.length === 11) {
    finalLink = numeros;

    QRCode.toCanvas(canvas, finalLink, {
      width: 260,
      margin: 2,
      errorCorrectionLevel: 'H'
    }, function () {
      adicionarLogo(canvas);
      document.getElementById("copiarBtn").style.display = "block";
    });

    linkGerado = finalLink;
    return;
  }

  // WHATSAPP
  if (/^\+?\d{10,15}$/.test(input)) {
    input = input.replace(/\D/g, "");
    if (!input.startsWith("55")) input = "55" + input;
    finalLink = `https://wa.me/${input}`;
  }

  // INSTAGRAM
  else if (input.startsWith("@") || (!input.includes("http") && !input.includes("."))) {
    input = input.replace("@", "");
    finalLink = `https://instagram.com/${input}`;
  }

  // LINK NORMAL
  else {
    if (!input.startsWith("http")) input = "https://" + input;
    finalLink = input;
  }

  linkGerado = finalLink;

  QRCode.toCanvas(canvas, finalLink, {
    width: 260,
    margin: 2,
    errorCorrectionLevel: 'H'
  }, function () {
    adicionarLogo(canvas);
    document.getElementById("copiarBtn").style.display = "block";
  });
}

// LOGO
function adicionarLogo(canvas) {
  const input = document.getElementById("logoInput");
  if (input.files.length === 0) return;

  const ctx = canvas.getContext("2d");
  const img = new Image();

  img.onload = function () {
    const size = canvas.width * 0.18;
    const x = (canvas.width - size) / 2;
    const y = (canvas.height - size) / 2;

    ctx.fillStyle = "#ffffff";
    ctx.fillRect(x - 12, y - 12, size + 24, size + 24);

    ctx.imageSmoothingEnabled = true;
    ctx.imageSmoothingQuality = "high";

    ctx.drawImage(img, x, y, size, size);
  };

  const reader = new FileReader();
  reader.onload = e => img.src = e.target.result;
  reader.readAsDataURL(input.files[0]);
}

// COPIAR LINK
function copiarLink() {
  navigator.clipboard.writeText(linkGerado)
    .then(() => alert("Link copiado!"));
}

// COPIAR PIX
function copiarPix() {
  navigator.clipboard.writeText(pix)
    .then(() => alert("Código PIX copiado!"));
}

// BAIXAR
function baixarQR() {
  const canvas = document.getElementById("qrcode");
  const link = document.createElement("a");
  link.download = "qrcode.png";
  link.href = canvas.toDataURL();
  link.click();
}

// PIX FIXO
QRCode.toCanvas(document.getElementById('pixQR'), pix, { width: 180 });
document.getElementById("pixCode").innerText = pix;

// WHATSAPP
function enviarWhats() {
  let msg = document.getElementById("mensagem").value;
  let telefone = "5582999284225";
  window.open(`https://wa.me/${telefone}?text=${encodeURIComponent(msg)}`);
}
</script>

</body>
</html>
