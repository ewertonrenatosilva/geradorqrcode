<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Gerador de QR Code</title>

<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<style>
body {
  font-family: Arial;
  text-align: center;
  background: #f5f5f5;
  padding: 30px;
}

h1 {
  color: #0a7a3d;
}

input {
  width: 80%;
  padding: 10px;
  margin-top: 10px;
}

canvas {
  margin-top: 20px;
}

.box {
  background: white;
  padding: 20px;
  margin-top: 20px;
  border-radius: 10px;
  box-shadow: 0 0 10px rgba(0,0,0,0.1);
}

.pix {
  word-break: break-all;
  font-size: 12px;
  background: #eee;
  padding: 10px;
  border-radius: 5px;
}

textarea {
  width: 90%;
  height: 80px;
  margin-top: 10px;
}

button {
  padding: 10px 20px;
  margin-top: 10px;
  background: #0a7a3d;
  color: white;
  border: none;
  border-radius: 5px;
  cursor: pointer;
}
</style>
</head>

<body>

<h1>Gerador de QR Code</h1>

<!-- GERADOR -->
<div class="box">
  <h3>Crie seu QR Code</h3>

  <input type="text" id="link" placeholder="Digite link, @instagram ou número WhatsApp">
  <br><br>

  <input type="file" id="logoInput" accept="image/*">
  <br><br>

  <button onclick="gerarQR()">Gerar QR Code</button>
  <button onclick="baixarQR()">Baixar PNG</button>

  <br>
  <canvas id="qrcode"></canvas>
</div>

<!-- PIX -->
<div class="box">

  <canvas id="pixQR"></canvas>

  <p><strong>PIX Copia e Cola:</strong></p>
  <div class="pix" id="pixCode"></div>

  <p style="margin-top:15px;">
    <strong>Peço apenas uma contribuição de R$ 5,00 🙏</strong>
  </p>

</div>

<!-- AVALIAÇÃO -->
<div class="box">
  <h3>💬 Avaliação</h3>
  <textarea id="mensagem">Muito obrigado</textarea>
  <br>
  <button onclick="enviarWhats()">Enviar para WhatsApp</button>
</div>

<script>
const pix = "00020126330014br.gov.bcb.pix0111084713784855204000053039865802BR5911EWERTOSILVA6009Sao Paulo610901227-20062220518daqr83657656927025630452F9";

// 🔥 GERAR QR COM DETECÇÃO INTELIGENTE
function gerarQR() {
  let input = document.getElementById("link").value.trim();
  const canvas = document.getElementById("qrcode");

  if (!input) {
    alert("Digite algo válido!");
    return;
  }

  let finalLink = "";

  // 📱 WHATSAPP (número)
  if (/^\+?\d{10,15}$/.test(input)) {
    input = input.replace(/\D/g, "");
    if (!input.startsWith("55")) {
      input = "55" + input; // adiciona Brasil automaticamente
    }
    finalLink = `https://wa.me/${input}`;
  }

  // 📸 INSTAGRAM (@usuario ou usuario simples)
  else if (input.startsWith("@") || (!input.includes("http") && !input.includes("."))) {
    input = input.replace("@", "");
    finalLink = `https://instagram.com/${input}`;
  }

  // 🌐 LINK NORMAL
  else {
    if (!input.startsWith("http")) {
      input = "https://" + input;
    }
    finalLink = input;
  }

  QRCode.toCanvas(canvas, finalLink, {
    width: 300,
    margin: 2,
    errorCorrectionLevel: 'H'
  }, function (error) {
    if (error) return console.error(error);
    adicionarLogo(canvas);
  });
}

// 🔥 ADICIONAR LOGO
function adicionarLogo(canvas) {
  const input = document.getElementById("logoInput");
  if (input.files.length === 0) return;

  const ctx = canvas.getContext("2d");
  const img = new Image();

  img.onload = function () {
    const maxSize = canvas.width * 0.22;

    let width = img.width;
    let height = img.height;

    if (width > height) {
      height = (height / width) * maxSize;
      width = maxSize;
    } else {
      width = (width / height) * maxSize;
      height = maxSize;
    }

    const x = (canvas.width - width) / 2;
    const y = (canvas.height - height) / 2;

    ctx.fillStyle = "white";
    ctx.fillRect(x - 10, y - 10, width + 20, height + 20);

    ctx.drawImage(img, x, y, width, height);
  };

  const reader = new FileReader();
  reader.onload = e => img.src = e.target.result;
  reader.readAsDataURL(input.files[0]);
}

// 📥 BAIXAR
function baixarQR() {
  const canvas = document.getElementById("qrcode");

  const link = document.createElement("a");
  link.download = "qrcode.png";
  link.href = canvas.toDataURL("image/png");
  link.click();
}

// 💰 PIX QR
QRCode.toCanvas(document.getElementById('pixQR'), pix, {
  width: 200,
  errorCorrectionLevel: 'H'
});

// MOSTRAR PIX
document.getElementById("pixCode").innerText = pix;

// 📲 WHATSAPP
function enviarWhats() {
  let msg = document.getElementById("mensagem").value;
  let telefone = "5582999284225";

  let url = `https://wa.me/${telefone}?text=${encodeURIComponent(msg)}`;
  window.open(url, "_blank");
}
</script>

</body>
</html>
