<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Contábil Sheets</title>

<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<style>
  body {
    font-family: Arial;
    text-align: center;
    background: #f5f5f5;
    padding: 30px;
  }

  h1 {
    color: #0a7a3d;
  }

  canvas {
    margin-top: 20px;
  }

  .box {
    background: white;
    padding: 20px;
    margin-top: 20px;
    border-radius: 10px;
    box-shadow: 0 0 10px rgba(0,0,0,0.1);
  }

  .pix {
    word-break: break-all;
    font-size: 12px;
    background: #eee;
    padding: 10px;
    border-radius: 5px;
  }

  textarea {
    width: 90%;
    height: 80px;
    margin-top: 10px;
  }

  button {
    padding: 10px 20px;
    margin-top: 10px;
    background: #0a7a3d;
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
  }
</style>
</head>

<body>

<h1>Contábil Sheets</h1>

<div class="box">
  <h3>Acesse o sistema</h3>
  <canvas id="qrcode"></canvas>
</div>

<div class="box">
  <p><strong>Peço apenas uma única contribuição de R$ 5,00 para manter o site ativo por mais tempo.</strong></p>

  <canvas id="pixQR"></canvas>

  <p><strong>PIX Copia e Cola:</strong></p>
  <div class="pix" id="pixCode"></div>
</div>

<div class="box">
  <h3>💬 Avaliação</h3>
  <p>Deixe sua mensagem:</p>
  <textarea id="mensagem">Muito obrigado</textarea>
  <br>
  <button onclick="enviarWhats()">Enviar para WhatsApp</button>
</div>

<script>
  // LINK PRINCIPAL
  const link = "https://contabilsheetsoficial.github.io/Contabilidade/";

  // PIX
  const pix = "00020126330014br.gov.bcb.pix0111084713784855204000053039865802BR5911EWERTOSILVA6009Sao Paulo610901227-20062220518daqr83657656927025630452F9";

  // GERAR QR DO SITE
  QRCode.toCanvas(document.getElementById('qrcode'), link, {
    width: 250,
    errorCorrectionLevel: 'H'
  });

  // GERAR QR DO PIX
  QRCode.toCanvas(document.getElementById('pixQR'), pix, {
    width: 200,
    errorCorrectionLevel: 'H'
  });

  // MOSTRAR PIX TEXTO
  document.getElementById("pixCode").innerText = pix;

  // WHATSAPP
  function enviarWhats() {
    let msg = document.getElementById("mensagem").value;
    let telefone = "5582999284225";

    let url = `https://wa.me/${telefone}?text=${encodeURIComponent(msg)}`;

    window.open(url, "_blank");
  }
</script>

</body>
</html>
